name: Publish Docker image

# Builds the container and publishes it to Docker Hub as
# drakonis96/idprotector on every push to main and on every version tag /
# GitHub release. Multi-arch (amd64 + arm64) so it runs on PCs, servers and
# Raspberry Pi / Apple Silicon alike.
#
# Requires ONE repository secret:
#   DOCKERHUB_TOKEN  → a Docker Hub Access Token (Account Settings ›
#                      Security › New Access Token, Read/Write).
# If the secret is missing the workflow still runs green but skips the push.

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  release:
    types: [ published ]
  workflow_dispatch:

env:
  IMAGE: drakonis96/idprotector
  DOCKERHUB_USERNAME: drakonis96

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Docker Hub credentials
        id: creds
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Docker Hub push skipped::Add a DOCKERHUB_TOKEN secret (Settings › Secrets and variables › Actions) to enable publishing."
          fi

      - name: Set up QEMU
        if: steps.creds.outputs.available == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        if: steps.creds.outputs.available == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.creds.outputs.available == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        if: steps.creds.outputs.available == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=IDprotector
            org.opencontainers.image.description=Self-hosted, 100% client-side document redaction & watermarking for IDs/DNI.
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        if: steps.creds.outputs.available == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
