worker_processes  1;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Silence version banner.
    server_tokens off;

    server {
        listen       8683;
        server_name  _;
        root   /usr/share/nginx/html;
        index  index.html;

        # --- Privacy / security headers ---------------------------------
        # The app is fully client-side. This CSP blocks any outbound
        # connection, embedding, or third-party resource so that user
        # documents provably cannot leave the browser.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; worker-src 'self' blob:; child-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'; manifest-src 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;

        # Always revalidate the app shell (HTML/JS/CSS) so a freshly pulled
        # image is picked up immediately instead of serving a stale cached
        # bundle. Cheap 304s via ETag when nothing changed. Immutable vendor
        # assets below opt out of this with their own Cache-Control.
        add_header Cache-Control "no-cache" always;

        # gzip for the vendored libraries
        gzip on;
        gzip_types application/javascript text/css image/svg+xml application/json;
        gzip_min_length 1024;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Long cache for immutable vendor assets.
        location /vendor/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location = /healthz {
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }
    }
}
